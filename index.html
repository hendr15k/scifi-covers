<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sci-Fi Cover Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.header{padding:1.5rem 2rem;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:#161b22}
.header h1{font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:.5rem}
.header h1 span{color:#58a6ff}
.stats{color:#8b949e;font-size:.875rem;display:flex;gap:1.5rem}
.search-bar{max-width:1200px;margin:1rem auto;padding:0 1.5rem}
.search-bar input{width:100%;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:.6rem 1rem;border-radius:6px;font-size:.875rem;outline:none}
.search-bar input:focus{border-color:#58a6ff}
.search-bar input::placeholder{color:#8b949e}
.grid{max-width:1200px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer}
.card:hover{border-color:#58a6ff;transform:translateY(-2px)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#21262d}
.card .title{padding:.6rem .8rem;font-size:.75rem;color:#c9d1d9;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .num{font-size:.65rem;color:#484f58;padding:0 .8rem .5rem}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.lightbox .info{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:#fff;text-align:center;font-size:.875rem;background:rgba(0,0,0,.7);padding:.75rem 1.5rem;border-radius:8px}
.footer{text-align:center;padding:2rem;color:#8b949e;font-size:.8rem}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.75rem}.header{padding:1rem}}
</style>
</head>
<body>

<div class="header">
  <h1>📚 <span>Sci-Fi</span> Cover Gallery</h1>
  <div class="stats"><span id="count">100 covers</span></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search covers…" autocomplete="off">
</div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="" alt="">
  <div class="info" id="lbInfo"></div>
</div>

<div class="footer">
  <span id="footerText">100 covers</span> — hosted on GitHub Pages
</div>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbInfo = document.getElementById('lbInfo');

function render(q) {
  const query = (q||'').toLowerCase();
  const filtered = BOOKS.filter(b => !query || b.t.toLowerCase().includes(query));
  document.getElementById('count').textContent = filtered.length + ' cover' + (filtered.length!==1?'s':'');
  grid.innerHTML = filtered.map(b =>
    '<div class="card" data-file="'+b.f+'" data-title="'+b.t+'" data-num="'+b.n+'">' +
      '<img loading="lazy" src="'+b.f+'" alt="'+b.t+'">' +
      '<div class="title">'+b.t+'</div>' +
      '<div class="num">#'+b.n+'</div>' +
    '</div>'
  ).join('');
}

grid.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  lbImg.src = card.dataset.file;
  lbInfo.textContent = '#' + card.dataset.num + ' — ' + card.dataset.title;
  lightbox.classList.add('active');
});

lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
document.addEventListener('keydown', e => { if (e.key==='Escape') lightbox.classList.remove('active'); });

search.addEventListener('input', () => render(search.value));
render('');
