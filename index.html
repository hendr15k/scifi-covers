<html lang="de">
<head>
<meta charset="utf-8">

<title>Sci-Fi Cover Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.header{padding:1.5rem 2rem;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;background:#161b22}
.header h1{font-size:1.5rem;font-weight:700}
.header h1 span{color:#58a6ff}
.stats{color:#8b949e;font-size:.875rem;display:flex;gap:1.5rem}
.controls{max-width:1200px;margin:1rem auto;padding:0 1.5rem;display:flex;flex-direction:column;gap:.75rem}
.controls input{width:100%;background:#161b22;border:1px solid #30363d;color:#e6edf3;padding:.6rem 1rem;border-radius:6px;font-size:.875rem;outline:none}
.controls input:focus{border-color:#58a6ff}
.controls input::placeholder{color:#8b949e}
.chips{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{background:transparent;border:1px solid #30363d;color:#8b949e;padding:.35rem .75rem;border-radius:20px;font-size:.75rem;cursor:pointer;transition:all .2s}
.chip:hover{border-color:#8b949e;color:#e6edf3}
.chip.active{background:#58a6ff;border-color:#58a6ff;color:#fff}
.grid{max-width:1200px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1rem}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;transition:border-color .2s,transform .15s;cursor:pointer}
.card:hover{border-color:#58a6ff;transform:translateY(-2px)}
.card img{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#21262d}
.card .title{padding:.5rem .7rem .2rem;font-size:.72rem;color:#c9d1d9;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:600}
.card .author{padding:0 .7rem .3rem;font-size:.62rem;color:#8b949e;line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{padding:0 .7rem .5rem;display:flex;align-items:center;justify-content:space-between}
.card .num{font-size:.6rem;color:#484f58}
.card .genre{font-size:.55rem;color:#58a6ff;background:#161b2222;border:1px solid #30363d44;padding:1px 6px;border-radius:8px}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;align-items:center;justify-content:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.lightbox .info{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);color:#fff;text-align:center;font-size:.875rem;background:rgba(0,0,0,.7);padding:.75rem 1.5rem;border-radius:8px}
.lightbox .info .lb-author{color:#8b949e;font-size:.75rem;margin-top:.25rem}
.footer{text-align:center;padding:2rem;color:#8b949e;font-size:.8rem}
@media(max-width:600px){.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.75rem}.header{padding:1rem}}
</style>
</head>
<body>

  <div class="stats"><span id="count">100 covers</span></div>

<div class="grid" id="grid"></div>

<div class="lightbox" id="lightbox">
  <img id="lbImg" src="" alt="">
  <div class="info" id="lbInfo"></div>
</div>

<div class="footer">
  <span id="footerText">100 covers</span> — hosted on GitHub Pages
</div>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbInfo = document.getElementById('lbInfo');
let activeGenre = '';

function render() {
  const q = search.value.toLowerCase();
  const filtered = BOOKS.filter(b =>
    (!q || b.t.toLowerCase().includes(q) || (b.a && b.a.toLowerCase().includes(q))) &&
    (!activeGenre || b.g === activeGenre)
  );
  document.getElementById('count').textContent = filtered.length + ' cover' + (filtered.length !== 1 ? 's' : '');
  grid.innerHTML = filtered.map(b =>
    '<div class="card" data-file="' + b.f + '" data-title="' + b.t + '" data-author="' + (b.a||'') + '" data-num="' + b.n + '" data-genre="' + b.g + '">' +
      '<img loading="lazy" src="' + b.f + '" alt="' + b.t + '">' +
      '<div class="title">' + b.t + '</div>' +
      (b.a ? '<div class="author">' + b.a + '</div>' : '') +
      '<div class="meta"><span class="num">#' + b.n + '</span><span class="genre">' + b.g + '</span></div>' +
    '</div>'
  ).join('');
}

document.getElementById('genreChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  activeGenre = chip.dataset.genre;
  render();
});

grid.addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  lbImg.src = card.dataset.file;
  const author = card.dataset.author;
  lbInfo.innerHTML = '<div>#' + card.dataset.num + ' — ' + card.dataset.title + ' (' + card.dataset.genre + ')</div>' +
    (author ? '<div class="lb-author">' + author + '</div>' : '');
  lightbox.classList.add('active');
});

lightbox.addEventListener('click', () => lightbox.classList.remove('active'));
document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('active'); });

search.addEventListener('input', render);
render();
</script>
